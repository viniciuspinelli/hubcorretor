version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: hubcorretor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hubcorretor
      POSTGRES_PASSWORD: hubcorretor_secret
      POSTGRES_DB: hubcorretor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
